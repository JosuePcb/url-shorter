<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shorter</title>
    <meta name="description" content="Acorta tus URLs largas en segundos. Rápido, simple y gratis.">
    <link rel="stylesheet" href="/static/index.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <main id="main">
        <div id="welcome-section">
            <p id="url">URL</p>
            <p id="shorter">Shorter</p>
        </div>

        <input type="text" id="request" placeholder="Inserta el enlace" maxlength="2048">

        <button id="generateBtn" class="generate-btn">Acortar URL</button>

        <!-- Resultado -->
        <div id="result-container" class="result-container" style="display: none;">
            <input type="text" id="response" class="result-input" readonly>
            <button id="copyBtn" class="copy-btn" title="Copiar">
                <i data-lucide="copy"></i>
            </button>
        </div>

        <!-- Botón de tema -->
        <button id="themeToggle" class="theme-toggle">
            <i data-lucide="sun"></i>
        </button>
    </main>

    <footer class="footer">
        <p>&copy; Designed by Josue Hernandez</p>
    </footer>

    <script src="/static/index.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
